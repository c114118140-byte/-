<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>富樂夢文具王挑戰賽</title>
    <style>
        /* 清除瀏覽器預設的邊距，讓背景貼齊邊緣 */
        body {
            margin: 0;
            padding: 0;
            background-color: #222; /* 外圍底色設為深色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 讓內容在螢幕垂直置中 */
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
        }

        /* ⭐️ 核心觀念：建立一個尺寸固定的「遊戲畫布」 */
        #game-container {
            width: 1080px;  /* ⭐️ 改成手機標準寬度 */
            height: 1920px; /* ⭐️ 改成手機標準高度 */
            background-image: url('富樂夢916.jpg'); 
            background-size: cover;
            position: relative;
            overflow: hidden;

            flex-shrink: 0;
        }
    /* ⭐️ 關鍵修改：直式手機版建議以「中上方」為縮放基準，避免最上面的題目被切掉 */
            /*transform-origin: top center; 
        }

        /* ⭐️ 所有 UI 元件共用的絕對定位設定 */
        .ui-element {
            position: absolute;
            font-weight: bold;
        }

        /* --- 1. 題目文字排版 --- */
        #lblQuestion {
            top: 11%;            /* 往上移進白板 */
            left: 15%;           /* 左右留白 */
            width: 70%;          /* 寬度對齊白板 */
            height: 16%;         /* 高度對齊白板 */
            font-size: 36px;     /* 直式螢幕可以把字稍微放大 */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center; 
        }

        /* --- 2. 右側筆記本：分數與關卡 --- */
        #lblScore {
            top: 74%;          /* 大幅下移到筆記本的位置 */
            left: 41%;           /* 對齊「分數：」的右邊 */
            width: 15%;
            text-align: left;
            font-size: 42px;
            font-weight: bold;
        }

        #lblProgress {
            top: 74%;          
            left: 75%;           /* 對齊「關卡：」的右邊 */
            width: 15%;
            text-align: left;
            font-size: 42px;
            font-weight: bold;
        }
       

        /* --- 4. 答案按鈕排版與透明化 --- */
        .btn {
            position: absolute;
            background: transparent;
            border: none;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

/* 重新對準四個彩色區塊 (注意 top 數值是依序遞增的) */
/* left 抓 20%，width 抓 60%，讓文字置中於彩色條 */
        #btn0 { top: 33.5%; left: 20%; width: 60%; height: 7%; } /* 黃色 */
        #btn1 { top: 42.0%; left: 20%; width: 60%; height: 7%; } /* 粉色 */
        #btn2 { top: 50.5%; left: 20%; width: 60%; height: 7%; } /* 藍色 */
        #btn3 { top: 59.0%; left: 20%; width: 60%; height: 7%; } /* 綠色 */

    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="lblScore" class="ui-element">0</div>
        <div id="lblProgress" class="ui-element">0/20</div>
        
        <div id="lblQuestion" class="ui-element">一般無毒橡皮擦標榜不含哪種有害物質？</div>

        <button class="btn" id="btn0" onclick="checkAnswer(0)">塑化劑</button>
        <button class="btn" id="btn1" onclick="checkAnswer(1)">防腐劑</button>
        <button class="btn" id="btn2" onclick="checkAnswer(2)">螢光劑</button>
        <button class="btn" id="btn3" onclick="checkAnswer(3)">漂白水</button>

    </div>

    <script>
        
        // 這裡放 JavaScript：取代你原本的 C# 程式碼
        // 在網頁前端，我們通常直接把題目寫成 JSON 陣列，比讀取 txt 檔更穩定
        const questions = [
            {
                q: "富樂夢最著名的產品『消字靈』，其英文名稱是什麼？",
                options: ["Eraser King", "Eraser King(特製版)", "Eraser King(彩虹版)", "Eraser King(工廠版)"],
                ans: 0 // 正確答案是陣列的第 0 個
            },
            {
                q: "一般無毒橡皮擦標榜不含哪種有害物質？",
                options: ["螢光劑", "防腐劑", "塑化劑", "漂白水"],
                ans: 2
            },
            {
                q: "富樂夢博物館位於哪個城市？",
                options: ["台北市", "台中市", "台南市", "高雄市"],
                ans: 3
            },
            {
                q: "在 80、90 年代，富樂夢曾推出過一款風靡全台小學生的經典產品，上面有許多按鈕可以彈出不同機關，請問是哪種文具？",
                options: ["自動變形削鉛筆機", "多功能鉛筆盒", "發光變色墊板", "超級彈珠橡皮擦"],
                ans: 1
            },
            {
                q: "富樂夢致力於推廣『無毒環保』，他們大力提倡橡皮擦不應添加哪種常見的塑膠材質？",
                options: ["PE (聚乙烯)", "PET (聚酯纖維)", "PP (聚丙烯)", "PVC (聚氯乙烯)"],
                ans: 3
            },
        ];

        let currentQIndex = 0;
        let score = 0;
        let isOk = false;

        function showQuestion() {
            isOk = false;
            let currentQ = questions[currentQIndex];
            document.getElementById("lblQuestion").innerText = currentQ.q;
            document.getElementById("btn0").innerText = currentQ.options[0];
            document.getElementById("btn1").innerText = currentQ.options[1];
            document.getElementById("btn2").innerText = currentQ.options[2];
            document.getElementById("btn3").innerText = currentQ.options[3];

            document.getElementById("lblProgress").innerText = (currentQIndex + 1) + "/" + questions.length;
        }

        function checkAnswer(playerChoice) {
            if (isOk) return; // 鎖定作答
            isOk = true;

            let correctAns = questions[currentQIndex].ans;
            if (playerChoice === correctAns) {
                alert("答對了！");
                score += 10;
                document.getElementById("lblScore").innerText = score;
            } else {
                alert("答錯了！");
            }

            // 準備下一題
            currentQIndex++;
            if (currentQIndex < questions.length) {
                showQuestion();
            } else {
                alert("遊戲結束！總分：" + score);
            }
        }

        // 遊戲開始，顯示第一題
        showQuestion();

        function resizeGame() {
            const container = document.getElementById('game-container');
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
    
    // ⭐️ 數字換成新的 1080 和 1920
            const scaleX = windowWidth / 1080;
            const scaleY = windowHeight / 1920;
    
    // 取得縮放比例
            const scale = Math.min(scaleX, scaleY);
    
    // 套用縮放
            container.style.transform = `scale(${scale})`;
    
    // (可選) 讓畫布在畫面上保持水平置中
            const scaledWidth = 1080 * scale;
            container.style.left = `${(windowWidth - scaledWidth) / 2}px`;

    }

    // 監聽視窗大小改變事件 (例如手機旋轉、拉扯電腦視窗)
    window.addEventListener('resize', resizeGame);

    // 遊戲啟動時先執行一次縮放
    resizeGame();

    </script>
</body>
</html>
