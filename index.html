<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富樂夢文具王挑戰賽</title>
    <style>
        /* 清除瀏覽器預設的邊距，讓背景貼齊邊緣 */
        body {
            margin: 0;
            padding: 0;
            background-color: #222; /* 外圍底色設為深色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 讓內容在螢幕垂直置中 */
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
        }

        /* ⭐️ 核心觀念：建立一個尺寸固定的「遊戲畫布」 */
        #game-container {
            width: 1280px;
            height: 720px;
            background-image: url('你的木桌背景圖.jpg'); /* 替換成你的檔名 */
            background-size: cover;
            position: relative; /* 關鍵：設定為相對定位，裡面的東西才能以它為基準點 */
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* 加點陰影增加質感 */
            overflow: hidden;
            transform-origin: center center;
        }

        /* ⭐️ 所有 UI 元件共用的絕對定位設定 */
        .ui-element {
            position: absolute;
            font-weight: bold;
        }

        /* --- 1. 題目文字排版 --- */
        #lblQuestion {
            top: 15%;            /* 距離頂部 15% */
            left: 20%;           /* 距離左邊 20% */
            width: 60%;          /* 寬度佔畫布的 60% (對齊白板) */
            height: 25%;         /* 高度佔 25% */
            font-size: 32px;
            color: #333;
            /* 讓文字在白板框內完美垂直+水平置中 */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center; 
        }

        /* --- 2. 右側筆記本：分數與關卡 --- */
        #lblScore {
            top: 20%; 
            left: 85%; /* 放在右側筆記本的位子 */
            font-size: 28px;
        }
        #lblProgress {
            top: 28%; 
            left: 85%;
            font-size: 28px;
        }

        /* --- 3. 中央彩虹鉛筆：計時器 --- */
        #lblTimer {
            top: 48%; 
            left: 45%; 
            width: 10%;
            text-align: center;
            font-size: 28px;
            color: white; /* 為了在彩虹筆上看清楚，設為白色或深色 */
        }

        /* --- 4. 答案按鈕排版與透明化 --- */
        .btn {
            position: absolute;
            background: transparent; /* 背景透明 */
            border: none;            /* 去除邊框 */
            font-size: 28px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            /* 讓按鈕內的文字置中 */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s; /* 點擊時的小動畫準備 */
        }
        
        /* 當滑鼠移上去或點擊時，按鈕會稍微放大，增加遊戲手感 */
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }

        /* 獨立設定四個按鈕的位置 (覆蓋在圖片的彩色橡皮擦上) */
        #btn0 { top: 62%; left: 16%; width: 28%; height: 12%; } /* 黃色區域 */
        #btn1 { top: 62%; left: 51%; width: 28%; height: 12%; } /* 粉色區域 */
        #btn2 { top: 80%; left: 16%; width: 28%; height: 12%; } /* 藍色區域 */
        #btn3 { top: 80%; left: 51%; width: 28%; height: 12%; } /* 綠色區域 */

    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="lblScore" class="ui-element">20</div>
        <div id="lblProgress" class="ui-element">關卡: 3/20</div>
        
        <div id="lblQuestion" class="ui-element">一般無毒橡皮擦標榜不含哪種有害物質？</div>

        <button class="btn" id="btn0" onclick="checkAnswer(0)">塑化劑</button>
        <button class="btn" id="btn1" onclick="checkAnswer(1)">防腐劑</button>
        <button class="btn" id="btn2" onclick="checkAnswer(2)">螢光劑</button>
        <button class="btn" id="btn3" onclick="checkAnswer(3)">漂白水</button>

    </div>

    <script>
        
        // 這裡放 JavaScript：取代你原本的 C# 程式碼
        // 在網頁前端，我們通常直接把題目寫成 JSON 陣列，比讀取 txt 檔更穩定
        const questions = [
            {
                q: "富樂夢最著名的產品『消字靈』，其英文名稱是什麼？",
                options: ["Eraser King", "Eraser King(特製版)", "Eraser King(彩虹版)", "Eraser King(工廠版)"],
                ans: 0 // 正確答案是陣列的第 0 個
            },
            {
                q: "一般無毒橡皮擦標榜不含哪種有害物質？",
                options: ["塑化劑", "防腐劑", "螢光劑", "漂白水"],
                ans: 0
            }
        ];

        let currentQIndex = 0;
        let score = 0;
        let isOk = false;

        function showQuestion() {
            isOk = false;
            let currentQ = questions[currentQIndex];
            document.getElementById("lblQuestion").innerText = currentQ.q;
            document.getElementById("btn0").innerText = currentQ.options[0];
            document.getElementById("btn1").innerText = currentQ.options[1];
            document.getElementById("btn2").innerText = currentQ.options[2];
            document.getElementById("btn3").innerText = currentQ.options[3];
        }

        function checkAnswer(playerChoice) {
            if (isOk) return; // 鎖定作答
            isOk = true;

            let correctAns = questions[currentQIndex].ans;
            if (playerChoice === correctAns) {
                alert("答對了！");
                score += 10;
                document.getElementById("lblScore").innerText = score;
            } else {
                alert("答錯了！");
            }

            // 準備下一題
            currentQIndex++;
            if (currentQIndex < questions.length) {
                showQuestion();
            } else {
                alert("遊戲結束！總分：" + score);
            }
        }

        // 遊戲開始，顯示第一題
        showQuestion();

        function resizeGame() {
        const container = document.getElementById('game-container');
        // 取得目前瀏覽器視窗的寬高
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
    
        // 計算寬度與高度的縮放比例，取比較小的那個，確保畫面不會被裁切
        const scaleX = windowWidth / 1280;
        const scaleY = windowHeight / 720;
        const scale = Math.min(scaleX, scaleY);
    
        // 將計算出的比例套用到遊戲畫布上
        container.style.transform = `scale(${scale})`;
    }

    // 監聽視窗大小改變事件 (例如手機旋轉、拉扯電腦視窗)
    window.addEventListener('resize', resizeGame);

    // 遊戲啟動時先執行一次縮放
    resizeGame();

    </script>
</body>
</html>
